<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACKROOMS: Побег</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#ddd;user-select:none;}
  #gameCanvas{position:fixed;inset:0;display:block;}

  #blocker{
    position:fixed;inset:0;background:rgba(5,5,3,0.92);
    display:flex;align-items:center;justify-content:center;z-index:50;cursor:pointer;
  }
  #blockerBox{
    max-width:560px;padding:34px 40px;text-align:center;
    border:1px solid #6b5d2e;background:rgba(20,18,10,0.9);
    box-shadow:0 0 40px rgba(180,160,80,0.15) inset;
  }
  #blockerBox h1{
    color:#c9b458;letter-spacing:3px;font-size:30px;margin:0 0 6px 0;
    text-shadow:0 0 12px rgba(201,180,88,0.5);
  }
  #blockerBox h2{color:#877a44;font-weight:normal;font-size:14px;margin:0 0 20px 0;letter-spacing:2px;}
  #blockerBox p{font-size:14px;line-height:1.7;color:#bbb;margin:6px 0;}
  #blockerBox .key{color:#c9b458;font-weight:bold;}
  #startBtn{
    margin-top:22px;padding:12px 30px;background:#3a3416;border:1px solid #c9b458;color:#e9dfa8;
    font-family:'Courier New',monospace;font-size:16px;letter-spacing:2px;cursor:pointer;
  }
  #startBtn:hover{background:#4a4420;}

  #hud{position:fixed;inset:0;pointer-events:none;z-index:20;display:none;}
  #crosshair{
    position:absolute;top:50%;left:50%;width:6px;height:6px;margin:-3px 0 0 -3px;
    border-radius:50%;background:rgba(255,255,255,0.7);
    box-shadow:0 0 4px rgba(0,0,0,0.8);
  }
  #tapeCounter{
    position:absolute;top:18px;right:22px;font-size:20px;letter-spacing:1px;
    color:#e9dfa8;text-shadow:0 0 8px #000, 0 0 2px #000;
    display:flex;align-items:center;gap:8px;
  }
  #promptBox{
    position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
    font-size:15px;color:#fff;background:rgba(0,0,0,0.55);padding:8px 16px;
    border:1px solid rgba(255,255,255,0.3);display:none;white-space:nowrap;
  }
  #toast{
    position:absolute;top:26%;left:50%;transform:translateX(-50%);
    font-size:17px;color:#c9b458;background:rgba(0,0,0,0.6);padding:10px 20px;
    border:1px solid #6b5d2e;opacity:0;transition:opacity 0.4s;white-space:nowrap;
  }
  
  /* Статусы: Стамина и Здоровье */
  #barsContainer {
    position:absolute;bottom:24px;left:24px;display:flex;flex-direction:column;gap:8px;
  }
  .barWrap {
    width:160px;height:12px;background:rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.3);position:relative;
  }
  .barLabel {
    position:absolute;left:6px;top:-1px;font-size:10px;color:#fff;
    text-shadow:1px 1px 2px #000;z-index:2;line-height:12px;
  }
  #sprintBar{height:100%;width:100%;background:#c9b458;transition:width 0.1s linear;}
  #healthBar{height:100%;width:100%;background:#c0392b;transition:width 0.2s ease;}

  #vignette{
    position:fixed;inset:0;pointer-events:none;z-index:19;opacity:0;
    background:radial-gradient(circle at 50% 50%, transparent 35%, rgba(120,0,0,0.85) 100%);
    transition:opacity 0.15s linear;
  }
  #flash{
    position:fixed;inset:0;pointer-events:none;z-index:60;background:#fff;opacity:0;
  }

  /* Скример */
  #screamer {
    position:fixed;inset:0;z-index:100;display:none;background:#000;
    align-items:center;justify-content:center;overflow:hidden;
  }
  #screamerFace {
    width:100vw;height:100vh;background:radial-gradient(circle, #2a0000 0%, #000 70%);
    display:flex;align-items:center;justify-content:center;
  }
  #screamerFace svg {
    width:70vmin;height:70vmin;filter:drop-shadow(0 0 35px #ff0000);
    animation: screamShake 0.05s infinite alternate;
  }
  @keyframes screamShake {
    0% { transform: scale(1.1) translate(-10px, -10px) rotate(-2deg); }
    100% { transform: scale(1.25) translate(10px, 10px) rotate(2deg); }
  }

  #endScreen{
    position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,0.88);flex-direction:column;text-align:center;
  }
  #endScreen h1{font-size:46px;letter-spacing:4px;margin:0 0 14px 0;}
  #endScreen.dead h1{color:#a00;text-shadow:0 0 30px #a00;}
  #endScreen.won h1{color:#7fd67f;text-shadow:0 0 30px #2f7d2f;}
  #endScreen p{color:#ccc;font-size:15px;margin-bottom:24px;}
  #endScreen button{
    padding:12px 30px;background:#2a2a2a;border:1px solid #888;color:#eee;
    font-family:'Courier New',monospace;font-size:15px;letter-spacing:2px;cursor:pointer;
  }
  #endScreen button:hover{background:#3a3a3a;}
</style>

<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div id="crosshair"></div>
  <div id="tapeCounter">🎞 <span id="tapeCount">0</span>/7</div>
  <div id="promptBox">Нажмите <span class="key">E</span></div>
  <div id="toast"></div>
  
  <div id="barsContainer">
    <div class="barWrap">
      <span class="barLabel">ЗДОРОВЬЕ</span>

      <span class="barLabel">ВЫНОСЛИВОСТЬ</span>

    </div>

</div>

<div id="vignette"></div>
<div id="flash"></div>

<div id="screamer">
  <div id="screamerFace">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="#111" stroke="#300" stroke-width="2"/>
      <ellipse cx="30" cy="38" rx="8" ry="12" fill="#fff"/>
      <ellipse cx="70" cy="38" rx="8" ry="12" fill="#fff"/>
      <circle cx="30" cy="38" r="3" fill="#ff0000"/>
      <circle cx="70" cy="38" r="3" fill="#ff0000"/>
      <path d="M 20 75 Q 50 30 80 75 Q 50 100 20 75 Z" fill="#000" stroke="#800" stroke-width="2"/>
      <path d="M 25 60 L 30 70 L 35 60 L 40 70 L 45 60 L 50 70 L 55 60 L 60 70 L 65 60 L 70 70 L 75 60" fill="none" stroke="#fff" stroke-width="1.5"/>
    </svg>
  </div>
</div>

<div id="blocker">
  <div id="blockerBox">
    <h1>BACKROOMS</h1>
    <h2>НАЙДИ 7 КАССЕТ И СБЕГИ</h2>
    <p>Ты застрял в жёлтых коридорах. Ищи кассеты и аптечки.</p>
    <p><span class="key">W A S D</span> — движение &nbsp;|&nbsp; <span class="key">Мышь</span> — обзор</p>
    <p><span class="key">SHIFT</span> — бег &nbsp;|&nbsp; <span class="key">ПРОБЕЛ</span> — прыжок &nbsp;|&nbsp; <span class="key">E</span> — действие</p>
    <p>Собери 7 кассет и найди дверь. Монстр убивает с 3 ударов!</p>
    <div id="startBtn">НАЖМИТЕ, ЧТОБЫ НАЧАТЬ</div>
  </div>
</div>

<div id="endScreen">
  <h1 id="endTitle"></h1>
  <p id="endText"></p>
  <button id="restartBtn">НАЧАТЬ ЗАНОВО</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

/* ============================================================
   НАСТРОЙКИ ИГРЫ
============================================================ */
const CELL_SIZE   = 4;
const MAZE_SIZE   = 11;
const WALL_HEIGHT = 3.1;
const WALL_THICK  = 0.22;
const EYE_HEIGHT  = 1.6;
const PLAYER_RADIUS = 0.32;

const WALK_SPEED   = 3.4;
const SPRINT_SPEED = 5.6;

const MONSTER_WANDER_SPEED = 2.0;
const MONSTER_CHASE_SPEED  = 4.3;
const KILL_RADIUS          = 1.2;

const TOTAL_TAPES = 7;
const TOTAL_MEDKITS = 4;

const OFFSET = (MAZE_SIZE - 1) * CELL_SIZE / 2;
function worldX(i){ return i*CELL_SIZE - OFFSET; }
function worldZ(j){ return j*CELL_SIZE - OFFSET; }

/* ============================================================
   СОСТОЯНИЕ ИГРОКА И ИГРЫ
============================================================ */
let state = 'menu'; // menu | playing | dead | won
const keys = {};

let tapesCollected = 0;
let playerHealth = 100;
let stamina = 100;

// Игрок физика
const player = {
  x: worldX(0),
  z: worldZ(0),
  y: EYE_HEIGHT,
  vy: 0,
  isGrounded: true
};

const hitCooldown = 0;
let lastHitTime = 0;

/* ============================================================
   THREE.JS БАЗА
============================================================ */
const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x4a4020, 0.07);
scene.background = new THREE.Color(0x2a2410);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 200);
camera.rotation.order = 'YXZ';

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updatePointerLock ? camera.updateProjectionMatrix() : null;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* Свет */
scene.add(new THREE.AmbientLight(0x554a2c, 0.55));

const flashlight = new THREE.SpotLight(0xfff2cc, 1.5, 20, 0.5, 0.45, 1.5);
const flashTarget = new THREE.Object3D();
flashTarget.position.set(0.33, -0.34, -6);
camera.add(flashlight, flashTarget);
flashlight.target = flashTarget;
scene.add(camera);

const playerGlow = new THREE.PointLight(0xffdca0, 0.4, 3.5);
camera.add(playerGlow);

/* --- Рука игрока с фонариком --- */
const handGroup = new THREE.Group();
const sleeveMat = new THREE.MeshStandardMaterial({ color: 0x2c2820, roughness: 0.85 });
const skinMat   = new THREE.MeshStandardMaterial({ color: 0xcf9f79, roughness: 0.55 });
const metalMat  = new THREE.MeshStandardMaterial({ color: 0x2a2a2e, roughness: 0.35, metalness: 0.75 });

const sleeve = new THREE.Mesh(new THREE.CylinderGeometry(0.075, 0.095, 0.5, 10), sleeveMat);
sleeve.rotation.x = -Math.PI/2 + 0.25;
sleeve.position.set(0, 0.02, 0.18);
handGroup.add(sleeve);

const flBody = new THREE.Mesh(new THREE.CylinderGeometry(0.033, 0.041, 0.36, 12), metalMat);
flBody.rotation.x = -Math.PI/2;
flBody.position.set(0, 0, -0.34);
handGroup.add(flBody);

handGroup.position.set(0.33, -0.34, -0.5);
camera.add(handGroup);

/* ============================================================
   ПРОЦЕДУРНЫЕ ТЕКСТУРЫ
============================================================ */
function makeCanvas(size){ const c=document.createElement('canvas'); c.width=size; c.height=size; return c; }
const maxAniso = renderer.capabilities.getMaxAnisotropy ? renderer.capabilities.getMaxAnisotropy() : 4;
function finishTex(tex, repeatX, repeatY){
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  tex.anisotropy = maxAniso;
  return tex;
}

function makeWallMaps(){
  const S = 512;
  const c = makeCanvas(S), ctx = c.getContext('2d');
  const b = makeCanvas(S), bctx = b.getContext('2d');
  ctx.fillStyle = '#a89454'; ctx.fillRect(0,0,S,S);
  bctx.fillStyle = '#808080'; bctx.fillRect(0,0,S,S);
  const stripeW = 18;
  for(let x=0;x<S;x+=stripeW){
    const lighter = (x/stripeW)%2===0;
    ctx.fillStyle = lighter ? 'rgba(255,245,210,0.05)' : 'rgba(40,30,10,0.05)';
    ctx.fillRect(x,0,stripeW/2,S);
  }
  for(let k=0;k<30;k++){
    const x=Math.random()*S, y=Math.random()*S, r=10+Math.random()*40;
    ctx.fillStyle='rgba(45,38,14,0.15)'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  return {
    map: finishTex(new THREE.CanvasTexture(c), 3, 1.4),
    bump: finishTex(new THREE.CanvasTexture(b), 3, 1.4)
  };
}

function makeFloorMaps(){
  const S = 512;
  const c = makeCanvas(S), ctx = c.getContext('2d');
  ctx.fillStyle = '#4f4322'; ctx.fillRect(0,0,S,S);
  for(let i=0;i<5000;i++){
    ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.15})`;
    ctx.fillRect(Math.random()*S, Math.random()*S, 2, 2);
  }
  return { map: finishTex(new THREE.CanvasTexture(c), MAZE_SIZE, MAZE_SIZE) };
}

function makeCeilingMaps(){
  const S = 256;
  const c = makeCanvas(S), ctx = c.getContext('2d');
  ctx.fillStyle = '#d4cda6'; ctx.fillRect(0,0,S,S);
  ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=2;
  for(let x=0;x<=S;x+=64){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,S); ctx.stroke(); }
  for(let y=0;y<=S;y+=64){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(S,y); ctx.stroke(); }
  return { map: finishTex(new THREE.CanvasTexture(c), MAZE_SIZE, MAZE_SIZE) };
}

const wallMaps = makeWallMaps();
const floorMaps = makeFloorMaps();
const ceilingMaps = makeCeilingMaps();

const wallMaterial = new THREE.MeshStandardMaterial({ map: wallMaps.map, bumpMap: wallMaps.bump, bumpScale: 0.04, roughness:0.9 });
const floorMaterial = new THREE.MeshStandardMaterial({ map: floorMaps.map, roughness:0.95 });
const ceilingMaterial = new THREE.MeshStandardMaterial({ map: ceilingMaps.map, roughness:0.88 });

/* ============================================================
   ГЕНЕРАЦИЯ ЛАБИРИНТА
============================================================ */
let maze = [];
for(let i=0;i<MAZE_SIZE;i++){
  maze.push([]);
  for(let j=0;j<MAZE_SIZE;j++){
    maze[i].push({ i, j, visited:false, walls:{N:true,S:true,E:true,W:true} });
  }
}
(function generateMaze(){
  const opposite = { N:'S', S:'N', E:'W', W:'E' };
  function unvisitedNeighbors(cell){
    const dirs = [['N',0,-1],['S',0,1],['E',1,0],['W',-1,0]];
    const out = [];
    for(const [dir,di,dj] of dirs){
      const ni = cell.i+di, nj = cell.j+dj;
      if(ni>=0 && ni<MAZE_SIZE && nj>=0 && nj<MAZE_SIZE && !maze[ni][nj].visited){
        out.push({ dir, cell: maze[ni][nj] });
      }
    }
    return out;
  }
  let current = maze[0][0];
  current.visited = true;
  const stack = [current];
  while(stack.length){
    current = stack[stack.length-1];
    const opts = unvisitedNeighbors(current);
    if(opts.length === 0){ stack.pop(); continue; }
    const pick = opts[Math.floor(Math.random()*opts.length)];
    current.walls[pick.dir] = false;
    pick.cell.walls[opposite[pick.dir]] = false;
    pick.cell.visited = true;
    stack.push(pick.cell);
  }
  for(let i=0;i<MAZE_SIZE;i++){
    for(let j=0;j<MAZE_SIZE;j++){
      if(i < MAZE_SIZE-1 && maze[i][j].walls.E && Math.random() < 0.1) {
        maze[i][j].walls.E = false; maze[i+1][j].walls.W = false;
      }
    }
  }
})();

function neighborsOf(cell){
  const out = [];
  if(!cell.walls.N && cell.j>0) out.push(maze[cell.i][cell.j-1]);
  if(!cell.walls.S && cell.j<MAZE_SIZE-1) out.push(maze[cell.i][cell.j+1]);
  if(!cell.walls.E && cell.i<MAZE_SIZE-1) out.push(maze[cell.i+1][cell.j]);
  if(!cell.walls.W && cell.i>0) out.push(maze[cell.i-1][cell.j]);
  return out;
}

function bfsPath(start, goal){
  if(start === goal) return [];
  const visited = new Set([start.i+','+start.j]);
  const parent = new Map();
  const queue = [start];
  while(queue.length){
    const cur = queue.shift();
    if(cur === goal) break;
    for(const nb of neighborsOf(cur)){
      const key = nb.i+','+nb.j;
      if(!visited.has(key)){
        visited.add(key);
        parent.set(key, cur);
        queue.push(nb);
      }
    }
  }
  const goalKey = goal.i+','+goal.j;
  if(!visited.has(goalKey)) return null;
  const path = [];
  let cur = goal;
  while(cur !== start){
    path.unshift(cur);
    cur = parent.get(cur.i+','+cur.j);
    if(!cur) break;
  }
  return path;
}

function bfsDistances(start){
  const dist = new Map();
  dist.set(start.i+','+start.j, 0);
  const queue = [start];
  while(queue.length){
    const cur = queue.shift();
    const d = dist.get(cur.i+','+cur.j);
    for(const nb of neighborsOf(cur)){
      const key = nb.i+','+nb.j;
      if(!dist.has(key)){ dist.set(key, d+1); queue.push(nb); }
    }
  }
  return dist;
}

function worldToCell(x,z){
  let i = Math.round((x+OFFSET)/CELL_SIZE);
  let j = Math.round((z+OFFSET)/CELL_SIZE);
  i = Math.max(0, Math.min(MAZE_SIZE-1, i));
  j = Math.max(0, Math.min(MAZE_SIZE-1, j));
  return maze[i][j];
}

/* ============================================================
   СТЕНЫ И КОЛЛИЗИИ
============================================================ */
const wallBoxes = [];
function addWall(cx, cz, w, d){
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, WALL_HEIGHT, d), wallMaterial);
  mesh.position.set(cx, WALL_HEIGHT/2, cz);
  scene.add(mesh);
  const pad = PLAYER_RADIUS;
  wallBoxes.push({ minX: cx - w/2 - pad, maxX: cx + w/2 + pad, minZ: cz - d/2 - pad, maxZ: cz + d/2 + pad });
}

for(let i=0;i<MAZE_SIZE;i++){
  for(let j=0;j<MAZE_SIZE;j++){
    const cell = maze[i][j];
    const x = worldX(i), z = worldZ(j);
    if(cell.walls.W) addWall(x - CELL_SIZE/2, z, WALL_THICK, CELL_SIZE);
    if(cell.walls.N) addWall(x, z - CELL_SIZE/2, CELL_SIZE, WALL_THICK);
    if(i === MAZE_SIZE-1 && cell.walls.E) addWall(x + CELL_SIZE/2, z, WALL_THICK, CELL_SIZE);
    if(j === MAZE_SIZE-1 && cell.walls.S) addWall(x, z + CELL_SIZE/2, CELL_SIZE, WALL_THICK);
  }
}

function collides(x, z){
  for(let k=0;k<wallBoxes.length;k++){
    const b = wallBoxes[k];
    if(x > b.minX && x < b.maxX && z > b.minZ && z < b.maxZ) return true;
  }
  return false;
}

const floorSize = MAZE_SIZE * CELL_SIZE + CELL_SIZE;
const floor = new THREE.Mesh(new THREE.PlaneGeometry(floorSize, floorSize), floorMaterial);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(floorSize, floorSize), ceilingMaterial);
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = WALL_HEIGHT;
scene.add(ceiling);

/* ============================================================
   ОБЪЕКТЫ: КАССЕТЫ, АПТЕЧКИ, ДВЕРЬ
============================================================ */
const startCell = maze[0][0];
const distFromStart = bfsDistances(startCell);

let allCells = [];
for(let i=0;i<MAZE_SIZE;i++) for(let j=0;j<MAZE_SIZE;j++) allCells.push(maze[i][j]);

// Выход
let exitCell = startCell;
let maxDist = -1;
for(const cell of allCells){
  const d = distFromStart.get(cell.i+','+cell.j) || 0;
  if(d > maxDist){ maxDist = d; exitCell = cell; }
}

// Перемешивание для спавна предметов
let candidateCells = allCells.filter(c => (distFromStart.get(c.i+','+c.j)||0) > 1 && c !== exitCell);
for(let k=candidateCells.length-1;k>0;k--){
  const r = Math.floor(Math.random()*(k+1));
  [candidateCells[k], candidateCells[r]] = [candidateCells[r], candidateCells[k]];
}

const tapeCells = candidateCells.slice(0, TOTAL_TAPES);
const medkitCells = candidateCells.slice(TOTAL_TAPES, TOTAL_TAPES + TOTAL_MEDKITS);

/* --- КАССЕТЫ --- */
const tapeGeo = new THREE.BoxGeometry(0.32, 0.18, 0.5);
const tapeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness:0.4 });
const tapes = [];

tapeCells.forEach((cell, idx) => {
  const mesh = new THREE.Mesh(tapeGeo, tapeMat);
  const x = worldX(cell.i), z = worldZ(cell.j);
  mesh.position.set(x, 0.2, z);
  scene.add(mesh);
  const glow = new THREE.PointLight(0xe9dfa8, 0.8, 2.5);
  glow.position.set(x, 0.4, z);
  scene.add(glow);
  tapes.push({ mesh, glow, x, z, collected:false });
});

/* --- АПТЕЧКИ --- */
function createMedkitMesh(){
  const group = new THREE.Group();
  const boxMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.3 });
  const redMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.3 });
  
  const box = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.25, 0.3), boxMat);
  group.add(box);
  
  // Красный крест
  const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.01, 0.18), redMat);
  crossV.position.y = 0.13;
  const crossH = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.01, 0.06), redMat);
  crossH.position.y = 0.13;
  group.add(crossV, crossH);
  
  return group;
}

const medkits = [];
medkitCells.forEach((cell) => {
  const mesh = createMedkitMesh();
  const x = worldX(cell.i), z = worldZ(cell.j);
  mesh.position.set(x, 0.13, z);
  scene.add(mesh);
  const glow = new THREE.PointLight(0x00ff44, 0.5, 2);
  glow.position.set(x, 0.4, z);
  scene.add(glow);
  medkits.push({ mesh, glow, x, z, collected:false });
});

/* --- ДВЕРЬ ВЫХОДА --- */
const exitX = worldX(exitCell.i), exitZ = worldZ(exitCell.j);
const doorGroup = new THREE.Group();
doorGroup.position.set(exitX, 0, exitZ);

// Петля двери для правильной анимации открытия
const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.6, 0.1), new THREE.MeshStandardMaterial({ color: 0x111111 }));
doorFrame.position.set(0, 1.3, 0);

const doorPivot = new THREE.Group();
doorPivot.position.set(-0.75, 0, 0); // Левый край двери

const doorLeaf = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 2.5, 0.12),
  new THREE.MeshStandardMaterial({ color: 0x4a2e18, roughness: 0.6 }) // Реалистичная деревянная дверь
);
doorLeaf.position.set(0.75, 1.25, 0);

const handle = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8 }));
handle.position.set(1.3, 1.2, 0.08);
doorLeaf.add(handle);

doorPivot.add(doorLeaf);
doorGroup.add(doorFrame, doorPivot);
scene.add(doorGroup);

let doorOpening = false;
let doorAngle = 0;

/* ============================================================
   РЕАЛИСТИЧНЫЙ МОНСТР
============================================================ */
const monsterGroup = new THREE.Group();

const mSkinMat = new THREE.MeshStandardMaterial({ color: 0x12100e, roughness: 0.95 });
const mEyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

// Торс
const mTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.15, 1.4, 8), mSkinMat);
mTorso.position.y = 1.3;
monsterGroup.add(mTorso);

// Голова
const mHead = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 10), mSkinMat);
mHead.scale.set(0.8, 1.3, 0.9);
mHead.position.set(0, 2.1, 0);
monsterGroup.add(mHead);

// Глаза
const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), mEyeMat);
eyeL.position.set(-0.08, 2.15, 0.18);
const eyeR = eyeL.clone();
eyeR.position.x = 0.08;
monsterGroup.add(eyeL, eyeR);

// Руки и ноги для анимации
const mArmL = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 1.1, 6), mSkinMat);
mArmL.position.set(-0.32, 1.3, 0);
const mArmR = mArmL.clone();
mArmR.position.x = 0.32;

const mLegL = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.04, 1.1, 6), mSkinMat);
mLegL.position.set(-0.14, 0.55, 0);
const mLegR = mLegL.clone();
mLegR.position.x = 0.14;

monsterGroup.add(mArmL, mArmR, mLegL, mLegR);

scene.add(monsterGroup);

const monsterStartCell = candidateCells[candidateCells.length-1];
const monster = {
  x: worldX(monsterStartCell.i),
  z: worldZ(monsterStartCell.j),
  path: [],
  facing: 0,
  animTime: 0
};

/* ============================================================
   УПРАВЛЕНИЕ И ЛОГИКА ИГРЫ
============================================================ */
document.addEventListener('keydown', (e)=>{
  keys[e.code] = true;
  if(e.code === 'KeyE') handleInteraction();
});
document.addEventListener('keyup', (e)=>{ keys[e.code] = false; });

let yaw = 0, pitch = 0;
document.addEventListener('mousemove', (e)=>{
  if(document.pointerLockElement === document.body && state === 'playing'){
    yaw -= e.movementX * 0.0022;
    pitch -= e.movementY * 0.0022;
    pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
  }
});

const blocker = document.getElementById('blocker');
blocker.addEventListener('click', ()=>{
  document.body.requestPointerLock();
});

document.addEventListener('pointerlockchange', ()=>{
  if(document.pointerLockElement === document.body){
    blocker.style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    state = 'playing';
  } else if(state === 'playing'){
    blocker.style.display = 'flex';
    state = 'paused';
  }
});

document.getElementById('restartBtn').addEventListener('click', ()=>{
  window.location.reload();
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.opacity = '1';
  setTimeout(()=>{ t.style.opacity = '0'; }, 2500);
}

function handleInteraction(){
  // Подбор кассет
  tapes.forEach(t => {
    if(!t.collected && Math.hypot(player.x - t.x, player.z - t.z) < 1.4){
      t.collected = true;
      scene.remove(t.mesh); scene.remove(t.glow);
      tapesCollected++;
      document.getElementById('tapeCount').innerText = tapesCollected;
      showToast(`Кассета собрана (${tapesCollected}/${TOTAL_TAPES})`);
      if(tapesCollected === TOTAL_TAPES){
        showToast('Все кассеты собраны! Беги к выходу!');
      }
    }
  });

  // Подбор аптечек
  medkits.forEach(m => {
    if(!m.collected && Math.hypot(player.x - m.x, player.z - m.z) < 1.4){
      if(playerHealth < 100){
        m.collected = true;
        scene.remove(m.mesh); scene.remove(m.glow);
        playerHealth = Math.min(100, playerHealth + 33);
        updateHealthUI();
        showToast('Здоровье восстановлено (+33%)');
      } else {
        showToast('Здоровье уже полно!');
      }
    }
  });

  // Открытие двери
  if(tapesCollected >= TOTAL_TAPES && Math.hypot(player.x - exitX, player.z - exitZ) < 2.0){
    doorOpening = true;
  }
}

function updateHealthUI(){
  document.getElementById('healthBar').style.width = Math.max(0, playerHealth) + '%';
}

function triggerScreamer(){
  state = 'dead';
  document.exitPointerLock();
  const scr = document.getElementById('screamer');
  scr.style.display = 'flex';
  
  setTimeout(()=>{
    scr.style.display = 'none';
    const end = document.getElementById('endScreen');
    end.className = 'dead';
    document.getElementById('endTitle').innerText = 'ВЫ ПОГИБЛИ';
    document.getElementById('endText').innerText = 'Монстр настиг вас в бесконечных коридорах.';
    end.style.display = 'flex';
  }, 1800);
}

function winGame(){
  state = 'won';
  document.exitPointerLock();
  const end = document.getElementById('endScreen');
  end.className = 'won';
  document.getElementById('endTitle').innerText = 'ВЫ СПАСЛИСЬ!';
  document.getElementById('endText').innerText = 'Вам удалось выбраться из Backrooms!';
  end.style.display = 'flex';
}

/* ============================================================
   ОСНОВНОЙ ИГРОВОЙ ЦИКЛ
============================================================ */
let clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.1);

  if(state === 'playing'){
    /* --- Движение игрока --- */
    let speed = WALK_SPEED;
    
    // Стамина и бег
    const isSprinting = keys['ShiftLeft'] || keys['ShiftRight'];
    const isMoving = keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'];

    if(isSprinting && isMoving && stamina > 0){
      speed = SPRINT_SPEED;
      stamina = Math.max(0, stamina - delta * 30); // Расход стамины
    } else {
      stamina = Math.min(100, stamina + delta * 20); // Восстановление стамины
    }
    document.getElementById('sprintBar').style.width = stamina + '%';

    // Вектор направления
    let moveX = 0, moveZ = 0;
    if(keys['KeyW']) moveZ -= 1;
    if(keys['KeyS']) moveZ += 1;
    if(keys['KeyA']) moveX -= 1;
    if(keys['KeyD']) moveX += 1;

    if(moveX !== 0 || moveZ !== 0){
      const len = Math.hypot(moveX, moveZ);
      moveX /= len; moveZ /= len;

      const cos = Math.cos(yaw), sin = Math.sin(yaw);
      const dx = (moveX * cos - moveZ * sin) * speed * delta;
      const dz = (moveX * sin + moveZ * cos) * speed * delta;

      if(!collides(player.x + dx, player.z)) player.x += dx;
      if(!collides(player.x, player.z + dz)) player.z += dz;
    }

    // Прыжок и гравитация
    if(keys['Space'] && player.isGrounded){
      player.vy = 4.0;
      player.isGrounded = false;
    }

    player.vy -= 12.0 * delta; // Гравитация
    player.y += player.vy * delta;

    if(player.y <= EYE_HEIGHT){
      player.y = EYE_HEIGHT;
      player.vy = 0;
      player.isGrounded = true;
    }

    camera.position.set(player.x, player.y, player.z);
    camera.rotation.set(pitch, yaw, 0);

    /* --- Проверка взаимодействия (Подсказка на экране) --- */
    let promptText = '';
    tapes.forEach(t => {
      if(!t.collected && Math.hypot(player.x - t.x, player.z - t.z) < 1.4){
        promptText = 'Нажмите E, чтобы поднять кассету';
      }
    });
    medkits.forEach(m => {
      if(!m.collected && Math.hypot(player.x - m.x, player.z - m.z) < 1.4){
        promptText = 'Нажмите E, чтобы взять аптечку';
      }
    });
    if(tapesCollected >= TOTAL_TAPES && Math.hypot(player.x - exitX, player.z - exitZ) < 2.0){
      promptText = 'Нажмите E, чтобы открыть дверь';
    }
    
    const pBox = document.getElementById('promptBox');
    if(promptText){
      pBox.innerHTML = promptText;
      pBox.style.display = 'block';
    } else {
      pBox.style.display = 'none';
    }

    /* --- Анимация открытия двери и Победа --- */
    if(doorOpening){
      doorAngle = Math.min(Math.PI / 2, doorAngle + delta * 2);
      doorPivot.rotation.y = doorAngle;
      if(doorAngle >= Math.PI / 2 && Math.hypot(player.x - exitX, player.z - exitZ) < 1.2){
        winGame();
      }
    }

    /* --- Логика ИИ Монстра --- */
    const distToPlayer = Math.hypot(monster.x - player.x, monster.z - player.z);

    // Поиск пути к игроку
    const mCell = worldToCell(monster.x, monster.z);
    const pCell = worldToCell(player.x, player.z);
    
    const path = bfsPath(mCell, pCell);
    if(path && path.length > 0){
      const nextTarget = { x: worldX(path[0].i), z: worldZ(path[0].j) };
      const mDx = nextTarget.x - monster.x;
      const mDz = nextTarget.z - monster.z;
      const mDist = Math.hypot(mDx, mDz);

      if(mDist > 0.1){
        const moveDist = MONSTER_CHASE_SPEED * delta;
        monster.x += (mDx / mDist) * moveDist;
        monster.z += (mDz / mDist) * moveDist;

        // ПРАВИЛЬНЫЙ РАЗВОРОТ МОНСТРА (Лицом к направлению движения)
        monster.facing = Math.atan2(mDx, mDz);
        monsterGroup.rotation.y = monster.facing;
      }
    }

    monsterGroup.position.set(monster.x, 0, monster.z);

    // Анимация бега монстра (махи руками и ногами)
    monster.animTime += delta * 12;
    const swing = Math.sin(monster.animTime) * 0.6;
    mArmL.rotation.x = swing;
    mArmR.rotation.x = -swing;
    mLegL.rotation.x = -swing;
    mLegR.rotation.x = swing;

    /* --- Атака монстра (3 удара для смерти) --- */
    if(distToPlayer < KILL_RADIUS && Date.now() - lastHitTime > 1000){
      lastHitTime = Date.now();
      playerHealth -= 34; // 3 удара = 100 урона
      updateHealthUI();
      
      // Красная вспышка урона
      const flash = document.getElementById('flash');
      flash.style.background = '#880000';
      flash.style.opacity = '0.5';
      setTimeout(()=>{ flash.style.opacity = '0'; }, 200);

      if(playerHealth <= 0){
        triggerScreamer();
      }
    }
  }

  renderer.render(scene, camera);
}

animate();

})();
</script>
</body>
</html>
